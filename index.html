<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock, Paper, Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<section id="game-container">
    <h1>Rock, Paper, Scissors</h1>
    
    <div id="playerDisplay">Player:</div>
    <div id="computerDisplay">Computer:</div>
    <div id="resultDisplay"></div>

    <div id="choicesDiv">
    <button aria-label="rock" onclick="playGame('rock')">✊</button>
    <button aria-label="paper" onclick="playGame('paper')">✋</button>
    <button aria-label="scissors" onclick="playGame('scissors')">✌️</button>
    </div>

    <div class="scoresDisplay">Player Score: 
        <span id="playerScoreDisplay">0</span>
    </div>
    <div class="scoresDisplay">Computer Score: 
        <span id="computerScoreDisplay">0</span>
    </div>

    <script src="index.js"></script>
</section> 
</body>
</html>
